name: Build dms-shell-git (Zen 3 Optimized)

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      # -------------------------
      # Update system
      # -------------------------
      - name: Update base system
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git sudo curl go

      # -------------------------
      # Create builder user
      # -------------------------
      - name: Create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      # -------------------------
      # Install quickshell (AUR)
      # -------------------------
      - name: Install quickshell
        run: |
          su builder -c '
            git clone https://aur.archlinux.org/quickshell.git
            cd quickshell
            makepkg -si --noconfirm
          '

      # -------------------------
      # Create PKGBUILD
      # -------------------------
      - name: Create PKGBUILD
        run: |
          cat > /home/builder/PKGBUILD << 'EOF'
          pkgname=dms-shell-git
          pkgver=0.0.0
          pkgrel=1
          pkgdesc="Dank Material Shell (git, Zen 3 optimized)"
          arch=(x86_64)
          url="https://github.com/AvengeMedia/DankMaterialShell"
          license=(GPL-3.0-or-later)

          depends=(quickshell)
          makedepends=(git go)

          provides=(dms-shell dms-git)
          conflicts=(dms-shell dms-git)

          source=("git+$url.git")
          sha256sums=('SKIP')

          options=(!debug)

          pkgver() {
            cd DankMaterialShell
            git describe --long --tags --abbrev=7 2>/dev/null \
              | sed 's/^v//;s/-/.r/;s/-/./' || \
              printf "r%s.%s" "$(git rev-list --count HEAD)" "$(git rev-parse --short HEAD)"
          }

          build() {
            cd DankMaterialShell/core

            # Go tuning
            export GOAMD64=v3
            export GOFLAGS="-trimpath -buildmode=pie"
            export CGO_ENABLED=1

            # Zen 3 optimization
            export CFLAGS="-march=znver3 -mtune=znver3 -O3 -pipe -fno-plt"
            export CXXFLAGS="$CFLAGS"

            # Linker tuning
            export LDFLAGS="-Wl,-O1,--as-needed,-z,relro,-z,now"

            make
          }

          package() {
            cd DankMaterialShell

            install -Dm755 core/bin/dms "$pkgdir/usr/bin/dms"

            install -dm755 "$pkgdir/usr/share/quickshell/dms"
            cp -r quickshell/* "$pkgdir/usr/share/quickshell/dms/"
          }
          EOF

          chown -R builder:builder /home/builder

      # -------------------------
      # Build package
      # -------------------------
      - name: Build dms-shell-git
        run: |
          su builder -c '
            export MAKEFLAGS="-j$(nproc)"
            cd ~ && makepkg -s --noconfirm
          '

      # -------------------------
      # Prepare release
      # -------------------------
      - name: Prepare release
        id: pkg
        run: |
          PKG_PATH=$(find /home/builder -maxdepth 1 -type f -name "dms-shell-git-*-x86_64.pkg.tar.zst" ! -name "*debug*")
          PKG_FILE=$(basename "$PKG_PATH")

          VERSION=$(echo "$PKG_FILE" | sed -E 's/^dms-shell-git-(.*)-x86_64\.pkg\.tar\.zst/\1/')
          NEW_NAME="dms-shell-git-${VERSION}-x86_64_znver3.pkg.tar.zst"

          mkdir -p release
          cp "$PKG_PATH" "release/$NEW_NAME"

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # -------------------------
      # Create GitHub Release
      # -------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.version }}-znver3
          name: dms-shell-git ${{ steps.pkg.outputs.version }} (Zen 3 Optimized)
          files: release/*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
