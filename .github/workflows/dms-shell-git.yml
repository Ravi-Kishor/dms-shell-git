name: Build dms-shell-git (x86-64-v3)

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      # 1. Initialize System & Permissions
      - name: System setup
        run: |
          # Refresh keys to prevent package installation failures
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm --needed base-devel git sudo go quickshell
          
          # Setup builder user
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          
          # Fix workspace ownership so builder can work here
          chown -R builder:builder .

      # 2. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important for git describe/pkgver() to work

      # 3. Fix Git Safety & Create PKGBUILD
      - name: Create PKGBUILD
        run: |
          sudo -u builder bash << 'EOF'
          # CRITICAL: Fix git "dubious ownership" for the builder user
          git config --global --add safe.directory /__w/$(basename $(pwd))/$(basename $(pwd))
          git config --global --add safe.directory "*"

          cat > PKGBUILD << 'INNER_EOF'
          pkgname=dms-shell-git
          pkgver=0.0.0
          pkgrel=1
          pkgdesc="Dank Material Shell (git, GOAMD64=v3 optimized)"
          arch=(x86_64)
          url="https://github.com/AvengeMedia/DankMaterialShell"
          license=(GPL-3.0-or-later)
          depends=(quickshell)
          makedepends=(git go)
          provides=(dms-shell dms-git)
          conflicts=(dms-shell dms-git)
          source=("git+$url.git")
          sha256sums=('SKIP')

          pkgver() {
            cd DankMaterialShell
            git describe --long --tags --abbrev=7 2>/dev/null | sed 's/^v//;s/-/.r/;s/-/./' || \
            printf "r%s.%s" "$(git rev-list --count HEAD)" "$(git rev-parse --short HEAD)"
          }

          build() {
            cd DankMaterialShell/core
            export GOAMD64=v3
            export CGO_ENABLED=1
            export GOFLAGS="-buildvcs=false -trimpath"
            go build -o bin/dms
          }

          package() {
            cd DankMaterialShell
            install -Dm755 core/bin/dms "$pkgdir/usr/bin/dms"
            install -dm755 "$pkgdir/usr/share/quickshell/dms"
            cp -r quickshell/* "$pkgdir/usr/share/quickshell/dms/"
          }
          INNER_EOF
          EOF

      # 4. Build
      - name: Build dms-shell-git
        run: |
          # Run as builder; -f allows overwriting if a previous failed run left files
          sudo -u builder bash -c 'export MAKEFLAGS="-j$(nproc)" && makepkg -sc --noconfirm'

      # 5. Prepare Release
      - name: Prepare release
        id: pkg
        run: |
          PKG_PATH=$(ls dms-shell-git-*-x86_64.pkg.tar.zst | grep -v "debug" | head -n 1)
          VERSION=$(echo "$PKG_PATH" | sed -E 's/^dms-shell-git-(.*)-x86_64\.pkg\.tar\.zst/\1/')
          NEW_NAME="dms-shell-git-${VERSION}-x86_64_v3.pkg.tar.zst"
          
          mv "$PKG_PATH" "$NEW_NAME"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "pkg_name=$NEW_NAME" >> $GITHUB_OUTPUT

      # 6. Upload
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.version }}-v3
          name: dms-shell-git ${{ steps.pkg.outputs.version }} (x86-64-v3)
          body: |
            Built with:
            - `GOAMD64=v3` (AVX2, BMI2, FMA enabled)
          files: ${{ steps.pkg.outputs.pkg_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
