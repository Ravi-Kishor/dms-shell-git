name: Build dms-shell-git (x86-64-v3)

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Update base system
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git sudo curl go quickshell

      - name: Create builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Create PKGBUILD
        run: |
          cat > /home/builder/PKGBUILD << 'EOF'
          pkgname=dms-shell-git
          pkgver=0.0.0
          pkgrel=1
          pkgdesc="Dank Material Shell (git, GOAMD64=v3 optimized)"
          arch=(x86_64)
          url="https://github.com/AvengeMedia/DankMaterialShell"
          license=(GPL-3.0-or-later)
          depends=(quickshell)
          makedepends=(git go)
          provides=(dms-shell dms-git)
          conflicts=(dms-shell dms-git)
          source=("git+$url.git")
          sha256sums=('SKIP')

          pkgver() {
            cd "$srcdir/DankMaterialShell"
            git describe --long --tags --abbrev=7 2>/dev/null | sed 's/^v//;s/-/.r/;s/-/./' || \
            printf "r%s.%s" "$(git rev-list --count HEAD)" "$(git rev-parse --short HEAD)"
          }

          build() {
            cd "$srcdir/DankMaterialShell"
            if [ -d "core" ]; then cd core; fi
            
            export GOAMD64=v3
            export CGO_ENABLED=1
            export GOFLAGS="-buildvcs=false -trimpath"
            go build -o dms-bin .
          }

          package() {
            cd "$srcdir/DankMaterialShell"
            BINARY_PATH=$(find . -name "dms-bin" -type f | head -n 1)
            install -Dm755 "$BINARY_PATH" "$pkgdir/usr/bin/dms"

            if [ -d "quickshell" ]; then
              install -dm755 "$pkgdir/usr/share/quickshell/dms"
              cp -r quickshell/* "$pkgdir/usr/share/quickshell/dms/"
            fi
          }
          EOF
          chown -R builder:builder /home/builder

      - name: Build dms-shell-git
        run: |
          # Fix for Git "dubious ownership" when switching to builder user
          sudo -u builder git config --global --add safe.directory "*"
          sudo -u builder bash -c '
            export MAKEFLAGS="-j$(nproc)"
            export GOAMD64=v3
            cd /home/builder && makepkg -s --noconfirm
          '

      - name: Prepare release
        id: pkg
        run: |
          PKG_PATH=$(find /home/builder -maxdepth 1 -type f -name "dms-shell-git-*-x86_64.pkg.tar.zst" ! -name "*debug*")
          PKG_FILE=$(basename "$PKG_PATH")
          VERSION=$(echo "$PKG_FILE" | sed -E 's/^dms-shell-git-(.*)-x86_64\.pkg\.tar\.zst/\1/')
          NEW_NAME="dms-shell-git-${VERSION}-x86_64_v3.pkg.tar.zst"

          mkdir -p release
          cp "$PKG_PATH" "release/$NEW_NAME"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.version }}-v3
          name: dms-shell-git ${{ steps.pkg.outputs.version }} (x86-64-v3)
          body: |
            Built with:
            - GOAMD64=v3 (AVX2, BMI2, FMA enabled)
          files: release/*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
