name: Build Arch Package

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - PKGBUILD
      - ".github/workflows/build.yml"
  schedule:
    - cron: "0 */6 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update system
        run: |
          pacman -Syu --noconfirm

      - name: Install build dependencies
        run: |
          pacman -S --needed --noconfirm \
            base-devel \
            git \
            go \
            make \
            sudo \
            pacman-contrib

      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build package
        run: |
          su builder -c "
            cd '$GITHUB_WORKSPACE'
            makepkg -s --cleanbuild --noconfirm
          "

      - name: Collect package
        id: package
        run: |
          mkdir -p release

          PKG=$(find . -maxdepth 1 -type f -name "*.pkg.tar.zst" ! -name "*debug*" | head -n1)

          cp "$PKG" release/

          VERSION=$(pacman -Qp "$PKG" | awk '{print $2}')

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "package=$(basename "$PKG")" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.package }}
          path: release/*.pkg.tar.zst

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package.outputs.version }}
          name: ${{ steps.package.outputs.package }}
          files: release/*.pkg.tar.zst
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}